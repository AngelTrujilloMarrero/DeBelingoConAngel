name: Auto Update Stats & Deploy

on:
  schedule:
    # Runs at 03:00 on January 1st every year
    # Waits for Admin migration (01:00 UTC) to finish reading data before deletion
    - cron: '0 3 1 1 *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Static Stats
        run: pnpm run generate-stats -- --force

      - name: Cleanup Old Events from Firebase
        if: success()
        run: |
          if [ -f cleanup-events.json ]; then
            echo "🗑️  Cleanup manifest found. Deleting old events from Firebase..."
            npx firebase-tools database:update /events cleanup-events.json --token "${{ secrets.FIREBASE_TOKEN }}" --project debelingoconangel --confirm
            rm cleanup-events.json
          else
            echo "ℹ️  No events to clean up."
          fi

      - name: Upload Historical Daily Visits to Firebase
        if: success()
        run: |
          if [ -f upload-daily-visits.json ]; then
            echo "📤  Upload manifest found. Archiving daily visits under /historicalDailyVisits..."
            npx firebase-tools database:update /historicalDailyVisits upload-daily-visits.json --token "${{ secrets.FIREBASE_TOKEN }}" --project debelingoconangel --confirm
            rm upload-daily-visits.json
          else
            echo "ℹ️  No historical daily visits to archive."
          fi

      - name: Cleanup Old Daily Visits from Firebase
        if: success()
        run: |
          if [ -f cleanup-daily-visits.json ]; then
            echo "🗑️  Cleanup manifest found. Deleting old daily visits from /dailyVisits..."
            npx firebase-tools database:update /dailyVisits cleanup-daily-visits.json --token "${{ secrets.FIREBASE_TOKEN }}" --project debelingoconangel --confirm
            rm cleanup-daily-visits.json
          else
            echo "ℹ️  No daily visits to clean up."
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update historical stats, event archives, daily visits and orchestra archive for the new year [skip ci]"
          file_pattern: 'src/data/historicalStats.json src/data/historicalDailyVisits.json src/data/orchestraArchive.json public/events-archive/* public/visits-archive/*'

      - name: Build and Deploy to Firebase
        run: |
          pnpm build
          npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
